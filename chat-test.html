<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Chat Test</title>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; }
    #messages { border: 1px solid #ccc; height: 300px; overflow-y: auto; padding: 10px; margin-bottom: 10px; background: #f9f9f9; }
    input { padding: 8px; margin: 4px; }
    button { padding: 8px 14px; margin: 4px; cursor: pointer; }
    #message { width: 60%; }
    .system { color: gray; font-style: italic; }
    .msg { color: black; }
  </style>
</head>
<body>
  <h2>Chat Test</h2>

  <div>
    <input id="username" placeholder="Username" />
    <input id="userId" type="number" value="1" style="display:none" />
    <input id="room" placeholder="Room name" value="general" />
    <button onclick="connect()">Connect & Join</button>
  </div>

  <br>
  <div id="messages"></div>

  <div>
    <input id="message" placeholder="Type a message..." onkeypress="if(event.key==='Enter') send()" />
    <button onclick="send()">Send</button>
  </div>

  <script>
    let socket;

    function connect() {
      const username = document.getElementById('username').value;
      const userId = parseInt(document.getElementById('userId').value);
      const room = document.getElementById('room').value;

      if (!username || !room) return alert('Fill in username and room');

      socket = io('http://localhost:3000');

      socket.on('connect', () => {
        log(`Connected (${socket.id})`, 'system');
        socket.emit('join', { room, username });
      });

      socket.on('roomHistory', (data) => {
        log(`--- History for ${data.room} ---`, 'system');
        data.messages.forEach(m => log(`${m.username}: ${m.content}`));
      });

      socket.on('systemMessage', (data) => {
        log(data.message, 'system');
      });

      socket.on('receiveMessage', (data) => {
        log(`${data.username}: ${data.content}`);
      });

      socket.on('receiveReply', (data) => {
        log(`${data.username} (reply to #${data.parentId}): ${data.content}`);
      });

      socket.on('userTyping', (data) => {
        log(`${data.username} is typing...`, 'system');
      });

      socket.on('reactionUpdated', (data) => {
        log(`Reaction ${data.emoji} on message #${data.messageId} (${data.added ? 'added' : 'removed'})`, 'system');
      });

      socket.on('errorMessage', (data) => {
        log(`ERROR: ${data.message}`, 'system');
      });

      socket.on('disconnect', () => log('Disconnected', 'system'));
    }

    function send() {
      const username = document.getElementById('username').value;
      const userId = parseInt(document.getElementById('userId').value);
      const room = document.getElementById('room').value;
      const content = document.getElementById('message').value;

      if (!socket || !content) return;

      socket.emit('sendMessage', { room, username, userId, content });
      document.getElementById('message').value = '';
    }

    function log(text, type = 'msg') {
      const div = document.getElementById('messages');
      div.innerHTML += `<div class="${type}">${text}</div>`;
      div.scrollTop = div.scrollHeight;
    }
  </script>
</body>
</html>
